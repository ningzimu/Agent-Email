name: Unit Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        node-version: ["18.17", "20", "22"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - uses: pnpm/action-setup@v4
        with:
          version: "10"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        # Tests use mocked IMAP via MAILBOX_INTERNAL_TEST_MODE; explicitly
        # disable any persistent daemon probe so a stray socket from a
        # cached runner doesn't route the calls elsewhere.
        env:
          MAILBOX_NO_DAEMON: "1"
        run: pnpm test
